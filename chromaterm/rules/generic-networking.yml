# Cross-vendor L2/L3 protocol states for switch and router SSH sessions.

- description: Half-duplex
  regex: (?i)\bhalf[- ]?duplex\b
  color: f#c71800
  exclusive: true

- description: Link and line protocol down
  regex: (?i)\b(administratively down|line protocol is down|link down|no carrier|not present|suspended|err-disabled)\b
  color: f#c71800
  exclusive: true

- description: Link and line protocol up
  regex: (?i)\b(line protocol is up|link up|connected)\b
  color: f#28c501
  exclusive: true

- description: Spanning tree - Problematic states
  regex: \b(BKN|(LOOP|ROOT|TYPE|PVID)_Inc|BLK|DISPUTE)\b
  color: f#c71800
  exclusive: true

- description: Spanning tree - Forwarding states
  regex: \b(FWD|Root|Desg|FORWARDING)\b
  color: f#28c501
  exclusive: true

- description: Spanning tree - Learning or listening
  regex: \b(LRN|LIST|learning|listening)\b
  color: f#cab902
  exclusive: true

- description: OSPF - Transitional states
  regex: \b(ATTEMPT|INIT|EXCHANGE|LOADING|2-WAY)\b
  color: f#cab902
  exclusive: true

- description: OSPF - Full adjacency
  regex: \b(2WAY|FULL)\b
  color: f#28c501
  exclusive: true

- description: BGP - Transitional states
  regex: \b(Idle|Connect|Active|OpenSent|OpenConfirm)\b
  color: f#cab902
  exclusive: true

- description: BGP - Established
  regex: \b(Established)\b
  color: f#28c501
  exclusive: true

- description: LACP and port-channel states
  regex: '(?i)\b(LACP|port-channel|bundled|suspended|hot-standby|individual)\b'
  color: f#03d28d
  exclusive: true

- description: Routing table admin distance and metric
  regex: '\b\[\d{1,3}/\d{1,12}\]\b'
  color: f#cab902
  exclusive: true
